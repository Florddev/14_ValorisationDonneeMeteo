name: CI

on:
  push:
    branches: ['**']
  pull_request:

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --extra dev

      - name: Lint backend
        working-directory: backend
        run: uv run ruff check . --output-format=json > ruff-report.json || true

      - name: Fail on lint errors
        working-directory: backend
        run: uv run ruff check .

      - name: Upload ruff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-scan-report
          path: backend/ruff-report.json

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

  test-backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        working-directory: backend
        run: |
          uv sync --extra dev
          cp .env.example .env

      - name: Start database
        working-directory: backend/timescaledb-env
        run: docker compose up -d --wait

      - name: Run tests
        working-directory: backend
        run: uv run pytest --junitxml=test-report.xml

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/test-report.xml

  test-frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run tests
        working-directory: frontend
        run: npm run test:ci -- --reporter=junit --outputFile=test-report.xml

      - name: Upload frontend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report
          path: frontend/test-report.xml

  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'

  build-push:
    needs: [lint, test-backend, test-frontend, security]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
